const D=[{d:'2026-04-07',s:'4/7',n:'7',w:'二',c:'東京'},{d:'2026-04-08',s:'4/8',n:'8',w:'三',c:'東京'},{d:'2026-04-09',s:'4/9',n:'9',w:'四',c:'東京'},{d:'2026-04-10',s:'4/10',n:'10',w:'五',c:'東京'},{d:'2026-04-11',s:'4/11',n:'11',w:'六',c:'東京'},{d:'2026-04-12',s:'4/12',n:'12',w:'日',c:'東京'},{d:'2026-04-13',s:'4/13',n:'13',w:'一',c:'東京'},{d:'2026-04-14',s:'4/14',n:'14',w:'二',c:'東京'},{d:'2026-04-15',s:'4/15',n:'15',w:'三',c:'東京'},{d:'2026-04-16',s:'4/16',n:'16',w:'四',c:'東京'}];

async function init(){aTheme();rDates();await lSt();await lDay();lW();lCur();sRT()}

function aTheme(){const dk=localStorage.getItem('theme')==='dark';document.documentElement.setAttribute('data-theme',dk?'dark':'');const t=document.getElementById('sTh');if(t)t.classList.toggle('on',dk)}

async function lSt(){const{data}=await sb.from('settings').select('*');if(data)data.forEach(r=>{st[r.key]=r.value});document.getElementById('snA').value=st.person_a;document.getElementById('snB').value=st.person_b;document.getElementById('pk0').textContent=st.person_a;document.getElementById('pk1').textContent=st.person_b}

function rDates(){const c=document.getElementById('dTabs');c.innerHTML=D.map(d=>`<div class="dtb${d.d===cd?' a':''}" onclick="swD('${d.d}')"><div class="dn">${d.n}</div><div class="ds">${d.s} ${d.w}</div><div class="dc">${d.c}</div></div>`).join('');setTimeout(()=>{const a=c.querySelector('.a');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},80)}
async function swD(d){cd=d;rDates();await lDay();lW()}

async function lW(){const el=document.getElementById('wBar');try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=35.6762&longitude=139.6503&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Asia/Tokyo&start_date=${cd}&end_date=${cd}`);const d=await r.json();if(d.daily&&d.daily.time&&d.daily.time.length){const mx=d.daily.temperature_2m_max[0],mn=d.daily.temperature_2m_min[0],rn=d.daily.precipitation_probability_max[0],co=d.daily.weathercode[0];const ic=co===0?'☀️':co<=3?'⛅':co<=49?'🌫️':co<=69?'🌧️':co<=79?'🌨️':co<=99?'⛈️':'🌤️';el.innerHTML=`<span class="wi">${ic}</span><span class="wt">${mn}°~${mx}°C</span><span>降雨 ${rn}%</span>`}else el.innerHTML=`<span class="wi">📅</span><span>尚無天氣預報</span>`}catch(e){el.innerHTML=`<span class="wi">⚠️</span><span>天氣載入失敗</span>`}}

async function lCur(){try{const r=await fetch('https://api.exchangerate-api.com/v4/latest/TWD');const d=await r.json();exR=d.rates.JPY;document.getElementById('cR').textContent=`1 TWD ≈ ${exR.toFixed(4)} JPY`}catch(e){document.getElementById('cR').textContent='匯率載入失敗，預設 1 TWD ≈ 4.6 JPY'}}
function cCalc(){const v=parseFloat(document.getElementById('cfV').value)||0;document.getElementById('ctV').value=cDir==='twd_jpy'?Math.round(v*exR):Math.round(v/exR)}
function cSwap(){cDir=cDir==='twd_jpy'?'jpy_twd':'twd_jpy';document.getElementById('cfL').textContent=cDir==='twd_jpy'?'TWD 台幣':'JPY 日圓';document.getElementById('ctL').textContent=cDir==='twd_jpy'?'JPY 日圓':'TWD 台幣';document.getElementById('cfV').value='';document.getElementById('ctV').value=''}
function qC(a){if(cDir!=='jpy_twd'){cDir='jpy_twd';document.getElementById('cfL').textContent='JPY 日圓';document.getElementById('ctL').textContent='TWD 台幣'}document.getElementById('cfV').value=a;cCalc()}

async function lDay(){await Promise.all([lTrip(),lFl(),lExp()])}
async function lTrip(){const{data}=await sb.from('trips').select('*').eq('date',cd).order('sort_order');ct=data&&data.length?data[0]:null;rDay()}
function rDay(){const idx=D.findIndex(d=>d.d===cd);if(!ct){['dHdr','dInfo','tRow'].forEach(id=>document.getElementById(id).innerHTML='');document.getElementById('sTitle').style.display='none';document.getElementById('sList').innerHTML='';document.getElementById('aStop').style.display='none';document.getElementById('mBtn').style.display='none';document.getElementById('cArea').innerHTML='';document.getElementById('noTrip').style.display='block';return}
document.getElementById('noTrip').style.display='none';const t=ct;
document.getElementById('dHdr').innerHTML=`<div class="dhd"><span class="dl">第${idx+1}天(${D[idx].w})</span><span class="ct">${t.city||D[idx].c}</span><div class="da"><button onclick="openTripM()" title="編輯">✏️</button><button onclick="delTrip()" title="刪除">🗑️</button></div></div>`;
document.getElementById('dInfo').innerHTML=`<div class="ig"><div class="ic"><div class="il">🎯 目的地</div><div class="iv">${t.dest||'—'}</div></div><div class="ic"><div class="il">🏨 住宿</div><div class="iv">${t.hotel||'—'}</div></div><div class="ic"><div class="il">📝 行程</div><div class="iv">${t.itin||'—'}</div></div><div class="ic"><div class="il">📝 備註</div><div class="iv">${t.notes||'—'}</div></div></div>`;
rTr();rSt();rCr()}
async function delTrip(){if(!confirm('確定刪除今天行程？'))return;await sb.from('trips').delete().eq('id',ct.id);lTrip()}

function rTr(){const sel=ct.transport?ct.transport.split(',').map(s=>s.trim()):[];document.getElementById('tRow').innerHTML=`<div class="tr">${TS.map(t=>`<span class="tt${sel.includes(t)?' a':''}" onclick="tTr('${t}')">${t}</span>`).join('')}${sel.filter(s=>!TS.includes(s)).map(t=>`<span class="tt a" onclick="tTr('${t}')">${t} <span onclick="event.stopPropagation();rmTr('${t}')" style="cursor:pointer;margin-left:2px">✕</span></span>`).join('')}<span class="tta" onclick="aTr()">＋</span></div>`}
async function tTr(tag){let sel=ct.transport?ct.transport.split(',').map(s=>s.trim()):[];if(sel.includes(tag))sel=sel.filter(s=>s!==tag);else sel.push(tag);const v=sel.join(', ');await sb.from('trips').update({transport:v}).eq('id',ct.id);ct.transport=v;rTr()}
async function rmTr(tag){let sel=ct.transport?ct.transport.split(',').map(s=>s.trim()):[];sel=sel.filter(s=>s!==tag);const v=sel.join(', ');await sb.from('trips').update({transport:v}).eq('id',ct.id);ct.transport=v;rTr()}
function aTr(){const v=prompt('輸入交通方式：');if(!v)return;tTr(v.trim())}

function rSt(){let stops=[];try{stops=typeof ct.stops==='string'?JSON.parse(ct.stops):(ct.stops||[])}catch(e){}
document.getElementById('sTitle').style.display='block';document.getElementById('aStop').style.display='block';document.getElementById('mBtn').style.display=stops.length?'flex':'none';
if(!stops.length){document.getElementById('sList').innerHTML='<div class="emp">尚未新增地點</div>';return}
document.getElementById('sList').innerHTML=stops.map((s,i)=>{const mu=s.map_url||`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name)}`;
return`<div class="sc" draggable="true" data-idx="${i}" ondragstart="dgS(event)" ondragover="dgO(event)" ondrop="dgD(event)" ondragend="dgE(event)" onclick="tgS(this,event)">
<div class="stp"><div class="sn">${i+1}</div><div class="sb"><div class="stm mono">${s.time||''}</div><div class="snm"><a href="${mu}" target="_blank" onclick="event.stopPropagation()"><span class="pin" style="font-size:12px">📍</span>${s.name}</a></div>${s.desc?`<div class="sds">${s.desc}</div>`:''}</div><span class="smn">⋮</span></div>
<div class="sex"><div class="sei">${s.note?`<div class="snt">${s.note}</div>`:'<div class="snt" style="color:var(--text3)">無備註</div>'}${s.map_url?`<a href="${s.map_url}" target="_blank" style="font-size:12px;color:var(--blue);display:block;margin-bottom:8px" onclick="event.stopPropagation()">🗺️ 自訂地圖連結</a>`:''}
<div class="sbt"><button class="sbtn" onclick="event.stopPropagation();edSt(${i})">✏️ 編輯</button><button class="sbtn x" onclick="event.stopPropagation();dlSt(${i})">🗑️ 刪除</button></div></div></div></div>`}).join('')}
function tgS(el,e){if(e.target.closest('a')||e.target.closest('.sbtn'))return;el.classList.toggle('op')}

function dgS(e){dgI=+e.currentTarget.dataset.idx;e.currentTarget.classList.add('dg');e.dataTransfer.effectAllowed='move'}
function dgO(e){e.preventDefault();e.currentTarget.classList.add('dv')}
function dgE(e){document.querySelectorAll('.sc').forEach(c=>c.classList.remove('dg','dv'))}
async function dgD(e){e.preventDefault();const to=+e.currentTarget.dataset.idx;if(dgI===null||dgI===to)return;let s=[...(ct.stops||[])];const[m]=s.splice(dgI,1);s.splice(to,0,m);await sb.from('trips').update({stops:s}).eq('id',ct.id);ct.stops=s;rSt();dgI=null}
async function dlSt(i){if(!confirm('刪除此地點？'))return;let s=[...(ct.stops||[])];s.splice(i,1);await sb.from('trips').update({stops:s}).eq('id',ct.id);ct.stops=s;rSt()}

function openMR(e){e.preventDefault();if(!ct||!ct.stops||!ct.stops.length){alert('尚未新增地點');return}
const s=ct.stops;if(s.length===1){window.open(s[0].map_url||`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s[0].name)}`,'_blank');return}
const o=encodeURIComponent(s[0].name),d=encodeURIComponent(s[s.length-1].name),wp=s.slice(1,-1).map(x=>encodeURIComponent(x.name)).join('|');
let u=`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}`;if(wp)u+=`&waypoints=${wp}`;u+='&travelmode=transit';window.open(u,'_blank')}

function parseMediaUrl(u){
if(!u)return{type:'link',url:u};
const gd=u.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
if(gd)return{type:'gdrive',url:`https://drive.google.com/file/d/${gd[1]}/preview`};
if(/drive\.google\.com.*\/preview/.test(u))return{type:'gdrive',url:u};
if(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(u))return{type:'img',url:u};
if(/\.(pdf)(\?.*)?$/i.test(u))return{type:'pdf',url:u};
if(/i\.imgur\.com/i.test(u))return{type:'img',url:u};
if(/i\.postimg\.cc/i.test(u))return{type:'img',url:u};
if(/i\.ibb\.co/i.test(u))return{type:'img',url:u};
if(/res\.cloudinary\.com/i.test(u))return{type:'img',url:u};
if(/instagram\.com\/(p|reel)\//i.test(u)){let iu=u.includes('?')?u.split('?')[0]:u;if(!iu.endsWith('/'))iu+='/';return{type:'ig',url:iu}}
return{type:'link',url:u}}

function rCr(){let creds=[];try{creds=typeof ct.creds==='string'?JSON.parse(ct.creds):(ct.creds||[])}catch(e){}
const el=document.getElementById('cArea');if(!ct){el.innerHTML='';return}
el.innerHTML=`<div class="cs"><div class="cti">📎 憑證</div>
${creds.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${creds.map((c,i)=>`<span style="padding:4px 10px;border-radius:16px;font-size:12px;cursor:pointer;border:.5px solid var(--bg3);background:var(--bg);transition:all .15s" onclick="showCred(${i})" id="credTab${i}">${c.label||'憑證'+(i+1)}</span>`).join('')}</div>
<div id="credPreview"></div>
<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${creds.map((c,i)=>`<button class="cdl" onclick="dlCr(${i})" style="font-size:11px;padding:2px 8px;border-radius:10px;border:.5px solid var(--bg3);background:var(--bg)">🗑 ${c.label||'憑證'+(i+1)}</button>`).join('')}</div>`:''}
<div class="ac" onclick="openCrM()">＋ 新增憑證</div></div>`;
if(creds.length)showCred(0)}
function showCred(i){let creds=ct.creds||[];const c=creds[i];if(!c)return;
document.querySelectorAll('[id^=credTab]').forEach((t,j)=>{t.style.background=j===i?'var(--blue-bg)':'var(--bg)';t.style.borderColor=j===i?'var(--blue)':'var(--bg3)';t.style.color=j===i?'var(--blue-dk)':'var(--text2)'});
const el=document.getElementById('credPreview');const m=parseMediaUrl(c.url);
if(m.type==='img')el.innerHTML=`<img src="${m.url}" style="width:100%;border-radius:6px;max-height:400px;object-fit:contain">`;
else if(m.type==='pdf'||m.type==='gdrive')el.innerHTML=`<iframe src="${m.url}" style="width:100%;height:400px;border:none;border-radius:6px" allow="autoplay"></iframe>`;
else el.innerHTML=`<a href="${m.url}" target="_blank" style="font-size:13px;color:var(--blue);word-break:break-all">📎 ${c.label||m.url}</a>`}
async function dlCr(i){let c=[...(ct.creds||[])];c.splice(i,1);await sb.from('trips').update({creds:c}).eq('id',ct.id);ct.creds=c;rCr()}

async function dlFl(id){if(!confirm('刪除此航班？'))return;await sb.from('flights').delete().eq('id',id);lFl()}

function rExp(){const tot=allE.reduce((s,e)=>s+(e.amount||0),0);document.getElementById('eTot').textContent=`¥ ${tot.toLocaleString()}`;
document.getElementById('eList').innerHTML=allE.map(e=>`<div class="li"><span style="padding:2px 7px;border-radius:8px;font-size:11px;background:${CC[e.category]||'#999'}20;color:${CC[e.category]||'#999'};flex-shrink:0">${e.category}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.item||''}</span><span class="mono" style="flex-shrink:0;width:75px;text-align:right;font-weight:600;font-size:12px">¥${(e.amount||0).toLocaleString()}</span><button class="ld" onclick="dlEx(${e.id})" style="flex-shrink:0">✕</button></div>`).join('');uChart()}
async function aExp(){const cat=document.getElementById('eCat').value,it=document.getElementById('eIt').value.trim(),am=parseFloat(document.getElementById('eAm').value)||0;if(!it&&!am)return;await sb.from('expenses').insert({date:cd,category:cat,item:it,amount:am,currency:'JPY'});document.getElementById('eIt').value='';document.getElementById('eAm').value='';lExp()}
async function dlEx(id){await sb.from('expenses').delete().eq('id',id);lExp()}

async function dPk(id){await sb.from('packing').delete().eq('id',id);lPk()}

async function lPhPrj(){const{data}=await sb.from('photo_refs').select('project');pPrj=[...new Set((data||[]).map(d=>d.project).filter(Boolean))];if(!pPrj.length)pPrj=['預設企劃'];if(!cPrj)cPrj=pPrj[0];rPhT();lPh()}
function rPhT(){document.getElementById('phTabs').innerHTML=pPrj.map(p=>`<div class="phb${p===cPrj?' a':''}" onclick="swPh('${p}')">${p}</div>`).join('')}
function swPh(p){cPrj=p;rPhT();lPh()}
async function lPh(){const{data}=await sb.from('photo_refs').select('*').eq('project',cPrj).order('sort_order');document.getElementById('phList').innerHTML=(data||[]).map(r=>{const m=r.ig_url?parseMediaUrl(r.ig_url):null;return`<div class="phc"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:500">${r.location||r.content||''}</span><button class="ld" onclick="dPh(${r.id})">✕</button></div>${r.notes?`<div style="font-size:11px;color:var(--text2);margin-top:3px">${r.notes}</div>`:''}${m&&m.type==='ig'?`<iframe src="${m.url}embed/" loading="lazy" style="width:100%;border:none;border-radius:6px;min-height:320px;margin-top:6px"></iframe>`:''}${m&&m.type==='img'?`<img src="${m.url}" style="width:100%;border-radius:6px;margin-top:6px" loading="lazy">`:''}${m&&(m.type==='pdf'||m.type==='gdrive')?`<iframe src="${m.url}" style="width:100%;height:400px;border:none;border-radius:6px;margin-top:6px"></iframe>`:''}${!r.ig_url&&r.content?`<div style="font-size:12px;margin-top:6px;white-space:pre-wrap">${r.content}</div>`:''}</div>`}).join('')||'<div class="emp">尚未新增參考</div>'}
async function dPh(id){await sb.from('photo_refs').delete().eq('id',id);lPh()}

function tTool(n){const ids={expense:'pe',shopping:'ps',packing:'pp',currency:'pu',photo:'pf'};const tids={expense:'te',shopping:'ts',packing:'tp',currency:'tc',photo:'tf'};
if(cTl===n){document.getElementById(ids[n]).classList.remove('a');document.getElementById(tids[n]).classList.remove('a');cTl=null;return}
if(cTl){document.getElementById(ids[cTl]).classList.remove('a');document.getElementById(tids[cTl]).classList.remove('a')}
cTl=n;document.getElementById(ids[n]).classList.add('a');document.getElementById(tids[n]).classList.add('a');
if(n==='shopping')lSh();if(n==='packing')lPk();if(n==='photo')lPhPrj();if(n==='expense')lExp()}

function openMo(h){document.getElementById('mCt').innerHTML=h;document.getElementById('mOv').classList.add('a')}
function clMo(e){if(e&&e.target!==document.getElementById('mOv'))return;document.getElementById('mOv').classList.remove('a')}
function clM(){document.getElementById('mOv').classList.remove('a')}

function openStopM(ei){const isE=ei!==undefined;const s=isE?ct.stops[ei]:{time:'',name:'',desc:'',note:'',map_url:''};
openMo(`<h3>${isE?'編輯地點':'新增地點'}</h3><div class="mf"><label>時間</label><input type="time" id="xsT" value="${s.time||''}"></div><div class="mf"><label>地點名稱</label><input id="xsN" value="${s.name||''}" placeholder="例：淺草寺"></div><div class="mf"><label>簡述（卡片外顯）</label><input id="xsD" value="${s.desc||''}" placeholder="例：賞櫻花"></div><div class="mf"><label>備註（展開後顯示）</label><textarea id="xsNo" placeholder="詳細備註">${s.note||''}</textarea></div><div class="mf"><label>自訂 Google Maps 連結（選填）</label><input id="xsM" value="${s.map_url||''}" placeholder="留空則自動產生"></div><div class="ma"><button class="mca" onclick="clM()">取消</button><button class="mok" onclick="svSt(${isE?ei:-1})">${isE?'儲存':'新增'}</button></div>`)}
function edSt(i){openStopM(i)}
async function svSt(ei){const t=document.getElementById('xsT').value,n=document.getElementById('xsN').value.trim(),d=document.getElementById('xsD').value.trim(),no=document.getElementById('xsNo').value.trim(),m=document.getElementById('xsM').value.trim();if(!n){alert('請輸入地點名稱');return}let s=[...(ct.stops||[])];if(ei>=0)s[ei]={...s[ei],time:t,name:n,desc:d,note:no,map_url:m};else s.push({time:t,name:n,desc:d,note:no,map_url:m});await sb.from('trips').update({stops:s}).eq('id',ct.id);ct.stops=s;rSt();clM()}

function openTripM(){const idx=D.findIndex(d=>d.d===cd);const t=ct||{};
openMo(`<h3>${ct?'編輯行程':'新增行程'}</h3><div class="mf"><label>城市</label><input id="xtC" value="${t.city||D[idx].c}"></div><div class="mf"><label>目的地</label><input id="xtD" value="${t.dest||''}" placeholder="例：淺草、上野"></div><div class="mf"><label>行程描述</label><textarea id="xtI" placeholder="今天的安排">${t.itin||''}</textarea></div><div class="mf"><label>住宿</label><input id="xtH" value="${t.hotel||''}"></div><div class="mf"><label>備註</label><textarea id="xtN">${t.notes||''}</textarea></div><div class="ma"><button class="mca" onclick="clM()">取消</button><button class="mok" onclick="svTrip()">儲存</button></div>`)}
async function svTrip(){const c=document.getElementById('xtC').value.trim(),d=document.getElementById('xtD').value.trim(),i=document.getElementById('xtI').value.trim(),h=document.getElementById('xtH').value.trim(),n=document.getElementById('xtN').value.trim();const idx=D.findIndex(x=>x.d===cd);
if(ct)await sb.from('trips').update({city:c,dest:d,itin:i,hotel:h,notes:n}).eq('id',ct.id);
else await sb.from('trips').insert({date:cd,day:`第${idx+1}天`,city:c,dest:d,itin:i,hotel:h,notes:n,stops:[],creds:[],sort_order:idx});await lTrip();clM()}

function openCrM(){openMo(`<h3>新增憑證</h3><div class="mf"><label>名稱</label><input id="xcL" placeholder="例：機票確認信、飯店訂房"></div><div class="mf"><label>連結</label><input id="xcU" type="url" placeholder="https://..."><div style="font-size:10px;color:var(--text3);margin-top:3px">支援圖片網址（.jpg/.png）、PDF 網址、或一般連結</div></div><div class="ma"><button class="mca" onclick="clM()">取消</button><button class="mok" onclick="svCr()">新增</button></div>`)}
async function svCr(){const l=document.getElementById('xcL').value.trim(),u=document.getElementById('xcU').value.trim();if(!u)return;let c=[...(ct.creds||[])];c.push({label:l||u,url:u});await sb.from('trips').update({creds:c}).eq('id',ct.id);ct.creds=c;rCr();clM()}

async function openFlM(eid){let f={person:st.person_a,direction:'去程',airline:'',flight_no:'',dep_airport:'',dep_terminal:'',dep_time:'',arr_airport:'',arr_terminal:'',arr_time:''};if(eid){const{data}=await sb.from('flights').select('*').eq('id',eid).single();if(data)f=data}
openMo(`<h3>${eid?'編輯航班':'新增航班'}</h3><div class="mf"><label>旅客</label><select id="xfP"><option value="${st.person_a}" ${f.person===st.person_a?'selected':''}>${st.person_a}</option><option value="${st.person_b}" ${f.person===st.person_b?'selected':''}>${st.person_b}</option></select></div><div class="mf"><label>方向</label><select id="xfD"><option value="去程" ${f.direction==='去程'?'selected':''}>去程</option><option value="回程" ${f.direction==='回程'?'selected':''}>回程</option></select></div><div class="mf"><label>航空公司</label><input id="xfA" value="${f.airline||''}"></div><div class="mf"><label>航班號碼</label><input id="xfN" value="${f.flight_no||''}"></div><div class="mf"><label>出發機場代號</label><input id="xfDp" value="${f.dep_airport||''}" placeholder="KHH"></div><div class="mf"><label>出發航廈</label><input id="xfDt" value="${f.dep_terminal||''}"></div><div class="mf"><label>出發時間</label><input type="time" id="xfDm" value="${f.dep_time||''}"></div><div class="mf"><label>抵達機場代號</label><input id="xfAp" value="${f.arr_airport||''}" placeholder="NRT"></div><div class="mf"><label>抵達航廈</label><input id="xfAt" value="${f.arr_terminal||''}"></div><div class="mf"><label>抵達時間</label><input type="time" id="xfAm" value="${f.arr_time||''}"></div><div class="ma"><button class="mca" onclick="clM()">取消</button><button class="mok" onclick="svFl(${eid||'null'})">${eid?'儲存':'新增'}</button></div>`)}
async function edFl(id){openFlM(id)}
async function svFl(eid){const o={date:cd,person:document.getElementById('xfP').value,direction:document.getElementById('xfD').value,airline:document.getElementById('xfA').value.trim(),flight_no:document.getElementById('xfN').value.trim(),dep_airport:document.getElementById('xfDp').value.trim().toUpperCase(),dep_terminal:document.getElementById('xfDt').value.trim(),dep_time:document.getElementById('xfDm').value,arr_airport:document.getElementById('xfAp').value.trim().toUpperCase(),arr_terminal:document.getElementById('xfAt').value.trim(),arr_time:document.getElementById('xfAm').value};
if(eid)await sb.from('flights').update(o).eq('id',eid);else await sb.from('flights').insert(o);lFl();clM()}

function openPrjM(){openMo(`<h3>新增影片企劃</h3><div class="mf"><label>企劃名稱</label><input id="xpN" placeholder="例：東京街拍 Vlog"></div><div class="ma"><button class="mca" onclick="clM()">取消</button><button class="mok" onclick="svPrj()">新增</button></div>`)}
function svPrj(){const n=document.getElementById('xpN').value.trim();if(!n)return;pPrj.push(n);cPrj=n;rPhT();clM()}
function openPhM(){openMo(`<h3>新增拍攝參考</h3><div class="mf"><label>媒體連結（選填）</label><input id="xrI" type="url" placeholder="IG 連結 或 圖片網址 (.jpg/.png)"><div style="font-size:10px;color:var(--text3);margin-top:3px">支援 Instagram 貼文連結、Imgur 等圖片網址</div></div><div class="mf"><label>文字描述</label><textarea id="xrC" placeholder="想拍的場景"></textarea></div><div class="mf"><label>拍攝地點</label><input id="xrL"></div><div class="mf"><label>備註</label><input id="xrN" placeholder="角度、光線等"></div><div class="ma"><button class="mca" onclick="clM()">取消</button><button class="mok" onclick="svPh()">新增</button></div>`)}
async function svPh(){const ig=document.getElementById('xrI').value.trim(),c=document.getElementById('xrC').value.trim(),l=document.getElementById('xrL').value.trim(),n=document.getElementById('xrN').value.trim();if(!ig&&!c){alert('請填入連結或文字描述');return}await sb.from('photo_refs').insert({project:cPrj,ref_type:ig?'media':'text',content:c,ig_url:ig||null,location:l,notes:n});lPh();clM()}

function sRT(){sb.channel('all').on('postgres_changes',{event:'*',schema:'public',table:'trips'},()=>lTrip()).on('postgres_changes',{event:'*',schema:'public',table:'flights'},()=>lFl()).on('postgres_changes',{event:'*',schema:'public',table:'expenses'},()=>lExp()).on('postgres_changes',{event:'*',schema:'public',table:'shopping'},()=>{if(cTl==='shopping')lSh()}).on('postgres_changes',{event:'*',schema:'public',table:'packing'},()=>{if(cTl==='packing')lPk()}).on('postgres_changes',{event:'*',schema:'public',table:'photo_refs'},()=>{if(cTl==='photo')lPh()}).on('postgres_changes',{event:'*',schema:'public',table:'settings'},()=>lSt()).subscribe()}
init();
</script>
</body>
</html>
